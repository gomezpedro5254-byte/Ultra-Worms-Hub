<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Worms Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #fff; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1, h2 { color: #ffcc00; text-align: center; }
        .container { background-color: #2a2a2a; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); margin-bottom: 20px; }
        form { display: grid; gap: 10px; }
        input { padding: 10px; border-radius: 4px; border: 1px solid #444; background-color: #333; color: white; }
        button { background-color: #ffcc00; color: #1a1a1a; border: none; padding: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #e6b800; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #444; }
        th { background-color: #333; color: #ffcc00; }
        tr:hover { background-color: #383838; }
        .refresh-btn { background-color: #4CAF50; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>🐛 Ultra Worms Hub 🐛</h1>
    <p style="text-align: center;">Lista de partidas activas para Worms Armageddon</p>

    <div class="container">
        <h2>Publicar Nueva Partida</h2>
        <form id="gameForm">
            <input type="text" id="game_name" placeholder="Nombre de la partida (ej: ¡Solo inters!)" required>
            <input type="text" id="host_name" placeholder="Tu Nickname" required>
            <input type="text" id="host_ip" placeholder="Cargando tu IP pública..." required readonly style="background-color: #222; color: #888;">
            <input type="number" id="host_port" placeholder="Puerto (Por defecto 17011)" value="17011" required>
            <button type="submit">Publicar Partida</button>
        </form>
    </div>

    <div class="container">
        <h2>Partidas Disponibles</h2>
        <button class="refresh-btn" onclick="fetchGames()">🔄 Actualizar Lista</button>
        <table>
            <thead>
                <tr>
                    <th>Partida</th>
                    <th>Host (Creador)</th>
                    <th>Dirección IP / Puerto</th>
                    <th>Creada hace</th>
                </tr>
            </thead>
            <tbody id="gamesTableBody">
                <tr>
                    <td colspan="4" style="text-align: center;">Cargando partidas...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script> // --- CONEXIÓN COMPLETA Y LIMPIA A SUPABASE ---
    const SUPABASE_URL = "https://besjuhckvkeqsqnqxfty.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_EElidjP05Iermxu03Cr5UA_soLygxLc";

    // Inicializamos usando window para evitar que choque con duplicados ocultos
    const miSupabase = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

    // --- FUNCIÓN MÁGICA PARA OBTENER LA IP AUTOMÁTICAMENTE ---
    async function obtenerIpAutomatica() {
        try {
            const respuesta = await fetch('https://ipapi.co/json/');
            const datos = await respuesta.json();
            if (datos.ip) {
                document.getElementById('host_ip').value = datos.ip;
            }
        } catch (error) {
            console.error("Error cargando IP:", error);
            document.getElementById('host_ip').placeholder = "Escribe tu IP pública manualmente";
            document.getElementById('host_ip').readOnly = false;
            document.getElementById('host_ip').style.backgroundColor = "#333";
            document.getElementById('host_ip').style.color = "#fff";
        }
    }
    }
}
        // --- FUNCIÓN PARA VER/LEER PARTIDAS ---
        async function fetchGames() {
            const tbody = document.getElementById('gamesTableBody');
            
            const { data, error } = await miSupabase
                .from('games')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Error cargando partidas:", error);
                tbody.innerHTML = `<tr><td colspan="4" style="color: red; text-align: center;">Error al cargar datos de Supabase.</td></tr>`;
                return;
            }

            tbody.innerHTML = "";

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align: center;">No hay partidas activas. ¡Sé el primero en crear una!</td></tr>`;
                return;
            }

            data.forEach(game => {
                const tr = document.createElement('tr');
                const hora = new Date(game.created_at).toLocaleTimeString();

                tr.innerHTML = `
                    <td><strong>${escapeHtml(game.game_name)}</strong></td>
                    <td>${escapeHtml(game.host_name)}</td>
                    <td><code>${escapeHtml(game.host_ip)}:${game.host_port}</code></td>
                    <td>${hora}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- FUNCIÓN PARA PUBLICAR UNA PARTIDA ---
        document.getElementById('gameForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const game_name = document.getElementById('game_name').value;
            const host_name = document.getElementById('host_name').value;
            const host_ip = document.getElementById('host_ip').value;
            const host_port = parseInt(document.getElementById('host_port').value);

            const { error } = await miSupabase
                .from('games')
                .insert([
                    { game_name, host_name, host_ip, host_port }
                ]);

            if (error) {
                alert("Error al publicar la partida: " + error.message);
            } else {
                alert("¡Partida publicada con éxito!");
                document.getElementById('gameForm').reset();
                document.getElementById('host_port').value = "17011";
                obtenerIpAutomatica(); // Volver a cargar la IP automática tras limpiar
                fetchGames();
            }
        });

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }

        // Ejecutar funciones al cargar la página
        obtenerIpAutomatica();
        fetchGames();
    </script>
</body>
</html>
